project: toy
version: v1
salt: toy-v1
holdout_pct: 30
runner: runner.py:Runner
ingest: ingest.py:ingest
mutations: mutations.py:MUTATIONS
base_candidate: base.txt
objective: {name: within_tol, params: {tol: 0.5}}
guards: {anomaly_at: 0.95, overfit_gap: 0.20}
search: {rounds: 4, patience: 2}
model: {name: synthetic-stub, temperature: 0, max_tokens: 100}
bench: {candidates: [strict, lenient], eval_set: data/eval_set.txt}
